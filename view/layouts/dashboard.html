<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: "Google Sans", sans-serif;
        background-color: #f0f0f0;
        display: flex;
        background: linear-gradient(135deg, #52807c, #123535);
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .header{
        width: 60vw;
        background-color: #fff;
        border-radius: 4px;
        padding: 30px;
    }

    #lancamentos{
        display: flex;
        flex-direction: row;
        gap: 1rem;
    }

    #sessao-lancamentos{
        display: flex;
        justify-content: space-between;
        width: 60vw;
    }

    #ultimas-entradas, #ultimas-saidas{
        width: 29vw;
        background-color: #fff;
        padding: 30px;
        border-radius: 4px;
    }

    main{
        display: flex;
        flex-direction: column;
        gap:30px;
    }
</style>
<body>
    <main>
        <section class="header">
           <div>
                <p class="saudacao"></p>
                <p class="usuario">! <span id="icone-clima"></span></p>
           </div>
           <div id="lancamentos">
            <div id="entradas">
                <p>Receita Mensal</p>
                <p>R$00,00</p>
            </div>
            <div id="saidas">
                <p>Despesas Mensal</p>
                <p>R$00,00</p>
            </div>
           </div>
        </section>

        <section id="sessao-lancamentos">
            <div id="ultimas-entradas">
                <h3>Últimas entradas</h3>
                <p>R$2000,00</p>
            </div>
             <div id="ultimas-saidas">
                <h3>Últimas saídas</h3>
                <p>R$2000,00</p>
            </div>
        </section>
    </main>
    <script>

    </script>
</body>
</html>
